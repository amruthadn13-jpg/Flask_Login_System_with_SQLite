<!DOCTYPE html>
<html>
<head>
    <title>Login Page</title>
</head>

<body>

    <h2>Login System</h2>

    <form method="POST">

        <label>Username:</label><br>
        <input type="text" name="username" required><br><br>

        <label>Password:</label><br>
        <input type="password" name="password" required><br><br>

        <button type="submit">Login</button>

    </form>

    <h3>{{message}}</h3>

</body>
</html>
